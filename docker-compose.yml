version: "3.9"

services:
  postgres:
    image: postgres:16-alpine  # Small footprint, local-friendly
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radport
      POSTGRES_PASSWORD: radport
      POSTGRES_DB: radport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: